<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏新闻早报/晚报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            background: linear-gradient(135deg, #d0021b, #a00015);
            color: white;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.8; }
        .news-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .news-card img {
            width: 100%;
            display: block;
        }
        .news-list {
            list-style: none;
        }
        .news-list li {
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .news-list li:last-child { border-bottom: none; }
        .news-index {
            background: #d0021b;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .news-content h3 { font-size: 15px; margin-bottom: 4px; }
        .news-content p { font-size: 13px; color: #888; line-height: 1.5; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #fffbe6;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid #ffe58f;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.green { background: #52c41a; }
        .status-dot.gray { background: #d9d9d9; }
        .btn {
            display: inline-block;
            background: #d0021b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:active { opacity: 0.8; }
        .footer {
            text-align: center;
            color: #bbb;
            font-size: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 游戏行业新闻</h1>
        <p>每日早报 08:00 · 晚报 20:00</p>
    </div>

    <div class="status-bar">
        <span>
            <span class="status-dot green"></span>
            自动化运行中
        </span>
        <span>📅 自动每日更新</span>
    </div>

    <div class="news-card">
        <img src="outputs/game_news_20260716_0916.png" alt="最新游戏新闻" onerror="this.style.display='none'">
    </div>

    <div style="text-align: center; padding: 10px 0 30px;">
        <a class="btn" href="outputs/" target="_blank">📂 查看所有历史图片</a>
    </div>

    <div class="footer">
        资讯来源：GameLook、3DM、游民星空、IGN、GameSpot、IT之家、17173、A9VG等<br>
        自动生成 · WorkBuddy Cloud
    </div>
</body>
</html>
