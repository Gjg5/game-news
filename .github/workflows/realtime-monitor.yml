name: 实时新闻监控

on:
  schedule:
    # 每30分钟检查一次，北京时间 8:00-23:00
    - cron: '*/30 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install feedparser requests

      - name: 扫描新新闻 → 存入新闻池 + 生成pool.html
        run: |
          python realtime_monitor.py

      - name: 提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远程最新，避免与每日生成工作流并发冲突
          git pull --rebase origin main || git pull --rebase --strategy=ours origin main
          git add news_pool.json pool.html -f
          git diff --cached --quiet || git commit -m "chore: update news pool [skip ci]"
          # 推送失败重试一次
          git push || git pull --rebase origin main && git push
