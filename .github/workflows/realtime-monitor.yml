name: 实时新闻监控

on:
  schedule:
    - cron: '*/30 6-15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install feedparser requests

      - name: 扫描新新闻 → 存入新闻池
        run: |
          python realtime_monitor.py

      - name: 提交新闻池更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_pool.json -f
          git diff --cached --quiet || git commit -m "chore: update news pool [skip ci]"
          git push
