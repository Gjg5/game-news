name: 实时新闻监控

on:
  schedule:
    - cron: '*/30 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install feedparser requests

      - name: 扫描新新闻 + 更新pool.html
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python realtime_monitor.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只在文件有变化时才提交
          if git status --porcelain news_pool.json pool.html | grep -q .; then
            git add news_pool.json pool.html
            git commit -m "chore: update news pool [skip ci]"
            git push || (git pull --rebase origin main && git push)
          else
            echo "无变化，跳过提交"
          fi

      - name: 上传产出物到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
