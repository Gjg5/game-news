name: 游戏新闻自动生成

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00, 北京时间 20:00 = UTC 12:00
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-wqy-microhei 2>/dev/null || true

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 从新闻池生成长图并发送
        env:
          QQMAIL_PASSWORD: ${{ secrets.QQMAIL_PASSWORD }}
        run: |
          python game_news_generator.py

      - name: 提交更新（历史库 + 新闻池）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远程最新，避免与监控工作流并发冲突
          git pull --rebase origin main || git pull --rebase --strategy=ours origin main
          git add news_history.json history.html news_pool.json pool.html outputs/ -f
          git diff --cached --quiet || git commit -m "chore: 更新新闻历史库和池 [skip ci]"
          # 推送失败重试一次（应对并发场景）
          git push || git pull --rebase origin main && git push

      - name: 上传产出物到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
